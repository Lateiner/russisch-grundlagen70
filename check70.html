<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammatik-Matrix: играть (Shuffle-Modus)</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-dark: #2c3e50;
            --secondary-blue: #3498db;
            --success-green: #27ae60;
            --error-red: #e74c3c;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --border-color: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--primary-dark);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-dark);
            border-bottom: 3px solid var(--secondary-blue);
            padding-bottom: 10px;
            font-size: 1.6rem;
        }

        .instruction {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            line-height: 1.5;
            border-left: 5px solid var(--secondary-blue);
        }

        .matrix-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--white);
            min-width: 480px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #eef2f7;
            color: var(--primary-dark);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .term-column {
            text-align: left;
            font-weight: bold;
            background-color: #f1f3f5;
            width: 34%;
            font-size: 1.05rem;
        }

        .choice-cell {
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.4rem;
            user-select: none;
            width: 33%;
            min-height: 50px;
        }

        .choice-cell:hover {
            background-color: #f0f7ff;
        }

        .selected-correct {
            background-color: #d4edda !important;
            color: var(--success-green);
            font-weight: bold;
        }

        .selected-wrong {
            background-color: #f8d7da !important;
            color: var(--error-red);
            font-weight: bold;
        }

        .selected-correct::after { content: " ✓"; }
        .selected-wrong::after { content: " ✗"; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            color: white;
            font-size: 0.9rem;
        }

        .btn-reset { background-color: #e67e22; }
        .btn-solve { background-color: var(--secondary-blue); }
        .btn:active { transform: scale(0.98); }
        .btn:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            th, td { padding: 10px 5px; font-size: 0.8rem; }
            .term-column { font-size: 0.9rem; width: 40%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Grammatik-Matrix: играть</h1>
    
    <div class="instruction">
        <strong>Anleitung:</strong> Klicke für jeden Begriff in die richtige Spalte. 
        <br>Nutze den Button <strong>„Zurücksetzen & Mischen“</strong>, um die Begriffe jedes Mal in einer neuen Reihenfolge zu üben!
    </div>

    <div class="matrix-wrapper">
        <table id="grammar-matrix">
            <thead>
                <tr>
                    <th>Begriff</th>
                    <th>в + Akkusativ</th>
                    <th>на + Präpositional</th>
                </tr>
            </thead>
            <tbody id="matrix-body">
                <!-- Zeilen werden per JS generiert -->
            </tbody>
        </table>
    </div>

    <div class="controls">
        <button class="btn btn-reset" onclick="resetAndShuffle()">Zurücksetzen & Mischen</button>
        <button class="btn btn-solve" onclick="solveMatrix()">Lösungen anzeigen</button>
    </div>
</div>

<script>
    // Ursprungsdaten
    const originalData = [
        { term: "футбол", answer: 0 },
        { term: "гитара", answer: 1 },
        { term: "волейбол", answer: 0 },
        { term: "компьютер", answer: 1 },
        { term: "шахматы", answer: 0 },
        { term: "скрипка", answer: 1 },
        { term: "карты", answer: 0 },
        { term: "пианино", answer: 1 },
        { term: "теннис", answer: 0 },
        { term: "барабаны", answer: 1 },
        { term: "хоккей", answer: 0 },
        { term: "саксофон", answer: 1 },
        { term: "покер", answer: 0 },
        { term: "флейта", answer: 1 },
        { term: "баскетбол", answer: 0 }
    ];

    let currentData = [...originalData];

    // Fisher-Yates Shuffle Algorithmus
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initMatrix() {
        const tbody = document.getElementById('matrix-body');
        tbody.innerHTML = ''; // Vorherige Zeilen löschen

        currentData.forEach((item, rowIndex) => {
            const tr = document.createElement('tr');
            
            // Begriff-Spalte
            const tdTerm = document.createElement('td');
            tdTerm.className = 'term-column';
            tdTerm.textContent = item.term;
            tr.appendChild(tdTerm);

            // 'в'-Spalte
            const tdV = document.createElement('td');
            tdV.className = 'choice-cell';
            tdV.dataset.row = rowIndex;
            tdV.dataset.col = 0;
            tdV.onclick = () => handleChoice(rowIndex, 0);
            tr.appendChild(tdV);

            // 'на'-Spalte
            const tdNa = document.createElement('td');
            tdNa.className = 'choice-cell';
            tdNa.dataset.row = rowIndex;
            tdNa.dataset.col = 1;
            tdNa.onclick = () => handleChoice(rowIndex, 1);
            tr.appendChild(tdNa);

            tbody.appendChild(tr);
        });
    }

    function handleChoice(row, col) {
        const correctCol = currentData[row].answer;
        const cellsInRow = document.querySelectorAll(`td[data-row="${row}"]`);
        
        cellsInRow.forEach(cell => {
            cell.className = 'choice-cell';
        });

        const selectedCell = document.querySelector(`td[data-row="${row}"][data-col="${col}"]`);
        if (col === correctCol) {
            selectedCell.classList.add('selected-correct');
        } else {
            selectedCell.classList.add('selected-wrong');
            // Richtige Antwort anzeigen
            document.querySelector(`td[data-row="${row}"][data-col="${correctCol}"]`).classList.add('selected-correct');
        }
    }

    function resetAndShuffle() {
        currentData = shuffleArray([...originalData]);
        initMatrix();
    }

    function solveMatrix() {
        currentData.forEach((item, rowIndex) => {
            const cellsInRow = document.querySelectorAll(`td[data-row="${rowIndex}"]`);
            cellsInRow.forEach(cell => cell.className = 'choice-cell');
            
            const correctCell = document.querySelector(`td[data-row="${rowIndex}"][data-col="${item.answer}"]`);
            correctCell.classList.add('selected-correct');
        });
    }

    // Beim ersten Laden mischen und anzeigen
    resetAndShuffle();
</script>

</body>
</html>
