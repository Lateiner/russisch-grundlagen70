<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Lernkartei: играть</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --bg-green: #e8f5e9;
            --accent-green: #1b5e20;
            --card-white: #ffffff;
            --text-dark: #212121;
            --shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-green);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-green);
            text-align: center;
            margin-bottom: 5px;
            font-size: 1.6rem;
        }

        .progress {
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.1rem;
            background: rgba(255,255,255,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Karteikarten-Bereich */
        .flashcard-container {
            width: 100%;
            height: 350px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-radius: 20px;
            background-color: var(--card-white);
            border: 3px solid var(--light-green);
            box-shadow: var(--shadow);
        }

        .card-front {
            color: var(--accent-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f1f8e9;
            color: var(--text-dark);
        }

        .main-text {
            font-weight: 700;
            width: 100%;
            word-wrap: break-word;
        }

        .notiz {
            margin-top: 15px;
            font-size: 1rem;
            color: #555;
            font-weight: normal;
            font-style: italic;
        }

        /* Bedienungselemente */
        .controls, .extra-controls {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            margin-bottom: 12px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background-color: var(--primary-green);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            max-width: 200px;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--accent-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: #689f38;
        }

        .hint {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .flashcard-container { height: 300px; }
            h1 { font-size: 1.3rem; }
            button { padding: 12px 8px; font-size: 0.85rem; }
            .card-face { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lernkartei: Verben & Spiele</h1>
    <div class="progress" id="progress">1 / 36</div>

    <div class="flashcard-container" id="cardContainer" title="Klicken zum Umdrehen">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <div class="main-text" id="frontText">Lädt...</div>
            </div>
            <div class="card-face card-back">
                <div class="main-text" id="backText">Lädt...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="btnPrev">← Vorherige</button>
        <button id="btnNext">Nächste →</button>
    </div>

    <div class="extra-controls">
        <button class="btn-secondary" id="btnShuffle">Mischen</button>
        <button class="btn-secondary" id="btnHome">An den Anfang</button>
    </div>

    <div class="hint">
        <strong>Tipp:</strong> <br>
        Leertaste / Enter: Umdrehen <br>
        Pfeiltasten ← →: Navigieren | Pos1: Anfang
    </div>
</div>

<script>
    // Die Vokabelliste (Ordnungszahlen entfernt)
    const vocabData = [
        ["игра́ть / сыгра́ть", "spielen"],
        ["игра́ть / поигра́ть", "spielen", "", "(eine Zeit lang spielen)"],
        ["музыка́льный инструме́нт", "Musikinstrument"],
        ["гита́ра", "Gitarre"],
        ["пиани́но", "Klavier"],
        ["скри́пка", "Geige"],
        ["фле́йта", "Flöte"],
        ["бараба́ны", "Schlagzeug"],
        ["саксофо́н", "Saxophon"],
        ["труба́", "Trompete"],
        ["балала́йка", "Balalaika"],
        ["а́рфа", "Harfe"],
        ["роя́ль", "Flügel", "", "(Klavier)"],
        ["футбо́л", "Fußball"],
        ["те́ннис", "Tennis"],
        ["волейбо́л", "Volleyball"],
        ["баскетбо́л", "Basketball"],
        ["хокке́й", "Hockey / Eishockey"],
        ["го́льф", "Golf"],
        ["бадминто́н", "Badminton"],
        ["насто́льная игра́", "Brettspiel / Gesellschaftsspiel"],
        ["ша́хматы", "Schach"],
        ["ша́шки", "Dame", "", "(Spiel)"],
        ["ка́рты", "Karten / Kartenspiel"],
        ["по́кер", "Poker"],
        ["домино́", "Domino"],
        ["ло́то", "Lotto / Bingo"],
        ["пря́тки", "Verstecken", "", "(Spiel)"],
        ["компью́терная игра́", "Computerspiel"],
        ["компью́тер", "Computer"],
        ["телефо́н", "Telefon / Handy"],
        ["планше́т", "Tablet"],
        ["приста́вка", "Spielkonsole"],
        ["Монопо́лия", "Monopoly"],
        ["Ма́фия", "Mafia", "", "(Gesellschaftsspiel)"],
        ["У́но", "Uno", "", "(Kartenspiel)"]
    ];

    let currentDeck = [...vocabData];
    let currentIndex = 0;

    const card = document.getElementById('card');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const progressText = document.getElementById('progress');

    function updateCard() {
        const item = currentDeck[currentIndex];
        
        // Russian Text (Front)
        frontText.innerHTML = `<div class="content-wrapper">${item[0]}</div>`;
        if (item[2]) {
            frontText.innerHTML += `<div class="notiz">${item[2]}</div>`;
        }

        // German Text (Back)
        backText.innerHTML = `<div class="content-wrapper">${item[1]}</div>`;
        if (item[3]) {
            backText.innerHTML += `<div class="notiz">${item[3]}</div>`;
        }

        // Dynamische Schriftgröße
        adjustFontSize(frontText);
        adjustFontSize(backText);

        // Fortschritt
        progressText.innerText = `${currentIndex + 1} / ${currentDeck.length}`;
        
        // Karte immer auf Vorderseite zurücksetzen bei Navigation
        card.classList.remove('is-flipped');
    }

    function adjustFontSize(element) {
        const wrapper = element.querySelector('.content-wrapper');
        const textLength = wrapper.innerText.length;
        let size = 2.0; 

        if (textLength > 15) size = 1.7;
        if (textLength > 25) size = 1.4;
        if (textLength > 40) size = 1.1;

        wrapper.style.fontSize = size + "rem";
    }

    function nextCard() {
        if (currentIndex < currentDeck.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function toggleFlip() {
        card.classList.toggle('is-flipped');
    }

    function shuffleDeck() {
        for (let i = currentDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function goToHome() {
        currentIndex = 0;
        updateCard();
    }

    // Event Listeners
    document.getElementById('cardContainer').addEventListener('click', toggleFlip);
    document.getElementById('btnNext').addEventListener('click', nextCard);
    document.getElementById('btnPrev').addEventListener('click', prevCard);
    document.getElementById('btnShuffle').addEventListener('click', shuffleDeck);
    document.getElementById('btnHome').addEventListener('click', goToHome);

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault(); 
            toggleFlip();
        } else if (e.key === 'ArrowRight') {
            nextCard();
        } else if (e.key === 'ArrowLeft') {
            prevCard();
        } else if (e.key === 'Home') {
            goToHome();
        }
    });

    // Start
    updateCard();

</script>

</body>
</html>
